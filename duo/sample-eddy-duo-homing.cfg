# ============================================================
# BTT Eddy Duo — Sample Klipper Configuration WITH HOMING
# Two-coil (CH0 + CH1) eddy current probe on RP2040
# Use this if you want Eddy Duo to act as Z endstop
# ============================================================

# ----------------------------------------------------------
# MCU — Eddy Duo USB
# ----------------------------------------------------------
[mcu eddy_duo]
# SSH to Pi and run: ls /dev/serial/by-id/
serial: /dev/serial/by-id/usb-Klipper_rp2040_eddy_duo-if00
restart_method: command

# ----------------------------------------------------------
# MCU temperature (internal RP2040 sensor)
# ----------------------------------------------------------
[temperature_sensor btt_eddy_duo_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy_duo
min_temp: 10
max_temp: 100

# ----------------------------------------------------------
# Coil 0 — PRIMARY probe (LDC1612 CH0, I2C addr 0x2A)
# ----------------------------------------------------------
[probe_eddy_current btt_eddy_coil0]
sensor_type: ldc1612
descend_z: 2.5
i2c_mcu: eddy_duo
i2c_bus: i2c0f
# i2c_address: 0x2A   # Default when ADDR pin is LOW
x_offset: 0
y_offset: 21.42

# ----------------------------------------------------------
# Coil 1 — SECONDARY probe (LDC1612 CH1, I2C addr 0x2B)
# ADDR pin must be pulled HIGH on the Duo board
# ----------------------------------------------------------
[probe_eddy_current btt_eddy_coil1]
sensor_type: ldc1612
descend_z: 2.5
i2c_mcu: eddy_duo
i2c_bus: i2c0f
i2c_address: 0x2B
x_offset: 0
y_offset: 21.42

# ----------------------------------------------------------
# NTC temperature probe (thermal drift compensation)
# ----------------------------------------------------------
[temperature_probe btt_eddy_duo]
sensor_type: Generic 3950
sensor_pin: eddy_duo:gpio26
horizontal_move_z: 2

# ----------------------------------------------------------
# Safe Z homing — uses coil0 as virtual endstop
# Change home_xy_position to your bed center
# ----------------------------------------------------------
[safe_z_home]
home_xy_position: 150, 150
z_hop: 10
z_hop_speed: 25
speed: 200

# ----------------------------------------------------------
# In your [stepper_z] section, change:
#   endstop_pin: probe:z_virtual_endstop
# and remove or comment out:
#   position_endstop: 0
# ----------------------------------------------------------

# ----------------------------------------------------------
# Bed mesh
# ----------------------------------------------------------
[bed_mesh]
horizontal_move_z: 2
speed: 200
mesh_min: 10, 32
mesh_max: 220, 220
probe_count: 9, 9
algorithm: bicubic
#scan_overshoot: 8

# ----------------------------------------------------------
# Force move — needed if Z has never been homed and you need
# to manually lower the gantry during initial calibration
# ----------------------------------------------------------
[force_move]
enable_force_move: True

# ----------------------------------------------------------
# Macros
# ----------------------------------------------------------

[gcode_macro G28]
rename_existing: G28.1
gcode:
  G28.1 {rawparams}
  {% if not rawparams or (rawparams and 'Z' in rawparams) %}
    PROBE
    SET_Z_FROM_PROBE
  {% endif %}

[gcode_macro SET_Z_FROM_PROBE]
gcode:
  {% set cf = printer.configfile.settings %}
  SET_GCODE_OFFSET_ORIG Z={printer.probe.last_z_result - cf['probe_eddy_current btt_eddy_coil0'].descend_z + printer["gcode_macro SET_GCODE_OFFSET"].runtime_offset}
  G90
  G1 Z{cf.safe_z_home.z_hop}

[gcode_macro SET_GCODE_OFFSET]
rename_existing: SET_GCODE_OFFSET_ORIG
variable_restored: False
variable_runtime_offset: 0
gcode:
  SET_GCODE_OFFSET_ORIG { rawparams }

[gcode_macro PROBE_EDDY_CURRENT_CALIBRATE_AUTO]
gcode:
  BED_MESH_CLEAR
  G28 X Y
  G90
  G1 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000
  {% if 'z' not in printer.toolhead.homed_axes %}
    SET_KINEMATIC_POSITION Z={ printer.toolhead.axis_maximum.z-1 }
  {% endif %}
  PROBE_EDDY_CURRENT_CALIBRATE {rawparams}
