# ============================================================
# BTT Eddy Duo — Sample Klipper Configuration
# Two-coil (CH0 + CH1) eddy current probe on RP2040
# Use this if you have a dedicated Z endstop (not using Eddy for homing)
# ============================================================

# ----------------------------------------------------------
# MCU — this section is specific to Eddy Duo USB
# ----------------------------------------------------------
[mcu eddy_duo]
# Find your serial ID by SSHing to the Pi and running:
#   ls /dev/serial/by-id/
# It will look similar to:
#   usb-Klipper_rp2040_eddy_duo-if00
serial: /dev/serial/by-id/usb-Klipper_rp2040_eddy_duo-if00
restart_method: command

# ----------------------------------------------------------
# MCU temperature (internal RP2040 sensor)
# ----------------------------------------------------------
[temperature_sensor btt_eddy_duo_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy_duo
min_temp: 10
max_temp: 100

# ----------------------------------------------------------
# Coil 0 — PRIMARY probe (left coil or front coil)
# LDC1612 I2C address 0x2A (default, ADDR pin LOW)
# CH0 is used for primary Z probing
# ----------------------------------------------------------
[probe_eddy_current btt_eddy_coil0]
sensor_type: ldc1612
z_offset: 2.5
i2c_mcu: eddy_duo
i2c_bus: i2c0f
# i2c_address: 0x2A   # Default — change only if ADDR pin is pulled HIGH (0x2B)
# Adjust X/Y offsets to match your coil center relative to the nozzle
x_offset: 0
y_offset: 21.42

# ----------------------------------------------------------
# Coil 1 — SECONDARY probe (right coil or rear coil)
# LDC1612 I2C address 0x2B (ADDR pin HIGH)
# Used for redundancy, averaging, or IDEX second toolhead
# ----------------------------------------------------------
[probe_eddy_current btt_eddy_coil1]
sensor_type: ldc1612
z_offset: 2.5
i2c_mcu: eddy_duo
i2c_bus: i2c0f
i2c_address: 0x2B
# Adjust to your second coil's physical offset
x_offset: 0
y_offset: 21.42

# ----------------------------------------------------------
# NTC temperature probe (for thermal drift compensation)
# Only relevant for Eddy Duo USB. Comment out for Coil version.
# ----------------------------------------------------------
[temperature_probe btt_eddy_duo]
sensor_type: Generic 3950
sensor_pin: eddy_duo:gpio26
horizontal_move_z: 2

# ----------------------------------------------------------
# Bed mesh — uses coil0 as the primary scanning probe
# Adjust mesh_min / mesh_max for your bed size
# ----------------------------------------------------------
[bed_mesh]
horizontal_move_z: 2
speed: 200
# Calculate mesh extents:
#   mesh x min = position_min_x + max(15, x_offset)   (only if x_offset > 0)
#   mesh y min = position_min_y + max(15, y_offset)   (only if y_offset > 0)
#   mesh x max = position_max_x - max(15, |x_offset|) (only if x_offset < 0)
#   mesh y max = position_max_y - max(15, y_offset)   (only if y_offset > 0)
mesh_min: 10, 32      # 10 + 21.42 y_offset rounded up
mesh_max: 220, 220
probe_count: 9, 9
algorithm: bicubic
#scan_overshoot: 8   # Uncomment if you have scan overshoot room on X

# ----------------------------------------------------------
# Macros
# ----------------------------------------------------------

# Automates frequency mapping for coil 0
[gcode_macro PROBE_EDDY_CURRENT_CALIBRATE_AUTO]
gcode:
  BED_MESH_CLEAR
  G28 X Y
  G90
  G1 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000
  {% if 'z' not in printer.toolhead.homed_axes %}
    SET_KINEMATIC_POSITION Z={ printer.toolhead.axis_maximum.z-1 }
  {% endif %}
  PROBE_EDDY_CURRENT_CALIBRATE {rawparams}

[gcode_macro SET_GCODE_OFFSET]
rename_existing: SET_GCODE_OFFSET_ORIG
variable_restored: False
variable_runtime_offset: 0
gcode:
  SET_GCODE_OFFSET_ORIG { rawparams }
